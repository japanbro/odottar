const WD=["日","月","火","水","木","金","土"];
const TODAY=new Date(new Date().toDateString());
// 週はカレンダー週(月曜〜日曜)で定義する
const WEEK_START=(()=>{const m=new Date(TODAY);m.setDate(m.getDate()-((m.getDay()+6)%7));return m;})();      // 今週の月曜
const WEEK_END=(()=>{const e=new Date(WEEK_START);e.setDate(e.getDate()+6);return e;})();                     // 今週の日曜
const NEXT_WEEK_START=(()=>{const m=new Date(WEEK_START);m.setDate(m.getDate()+7);return m;})();              // 来週の月曜
const NEXT_WEEK_END=(()=>{const e=new Date(NEXT_WEEK_START);e.setDate(e.getDate()+6);return e;})();           // 来週の日曜
const d=s=>s?new Date(s+"T00:00:00"):null;
const dayDiff=(a,b)=>Math.round((a-b)/86400000);
const pad=n=>String(n).padStart(2,"0");
const isoDate=x=>`${x.getFullYear()}-${pad(x.getMonth()+1)}-${pad(x.getDate())}`;
// ソート用の実効開催日。複数日程で開催中のイベントは「本日」を基準にする（7/10なら7/10として並ぶ）
function effStart(e){if(!e.start)return"9999-99-99";return statusOf(e)==="live"?isoDate(TODAY):e.start;}
function shortDate(e){
  if(!e.start)return '<span class="nd">調査中</span>';
  const multi=e.end&&e.end!==e.start;
  // 開催中の複数日程は当日の日付を表示（7/10には7/10、7/11には7/11）
  const s=(statusOf(e)==="live"&&multi)?TODAY:d(e.start);
  return `<span class="mn">${s.getMonth()+1}/${s.getDate()}</span><span class="wd">${WD[s.getDay()]}${multi?"〜":""}</span>`;
}
function longDate(e){if(!e.start)return"日程未定";const f=x=>`${x.getMonth()+1}/${x.getDate()}(${WD[x.getDay()]})`;
  const body=(e.end&&e.end!==e.start)?f(d(e.start))+"〜"+f(d(e.end)):f(d(e.start));return "2026年 "+body;}
function statusOf(e){
  if(e.status==="中止")return"cxl";
  if(!e.start)return"tbd";
  const s=d(e.start),en=d(e.end||e.start);
  if(en<TODAY)return"end";
  if(s<=TODAY&&TODAY<=en)return"live";
  if(s<=WEEK_END)return"week";
  return"soon";
}
const ST={live:{t:"開催中",c:"live"},week:{t:"今週",c:"week"},soon:{t:"開催予定",c:"soon"},tbd:{t:"調査中",c:"tbd"},cxl:{t:"中止",c:"cxl"}};
let VISIBLE=DATA.filter(e=>statusOf(e)!=="end");
function rebuild(){VISIBLE=DATA.filter(e=>statusOf(e)!=="end");}

/* XSS対策: innerHTMLに差し込むデータは必ずHTMLエスケープ。hrefはhttp(s)のみ許可(javascript:等を無効化) */
const H=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const safeHref=u=>{const s=String(u==null?"":u).trim();return /^https?:\/\//i.test(s)?H(s):"#";};
/* いいねは不変ID(eid)をキーにする。
   旧v1はイベント名キーだったため、改名でカウント消失・同名別日イベント(例:都立東綾瀬公園×3)の合算が起きていた。
   v2で eid キーに移行し、旧データは名前→eidで一度だけ引き継ぐ。 */
const KEY="odottar_kininaru_v2";
const OLD_KEY="odottar_kininaru_v1";
const eidByName=n=>{const e=DATA.find(x=>x.name===n);return e?e.eid:null;};
let LIKED={};
try{
  LIKED=JSON.parse(localStorage.getItem(KEY)||"null")||null;
  if(!LIKED){ // v1 -> v2 移行(初回のみ)
    const old=JSON.parse(localStorage.getItem(OLD_KEY)||"{}");
    LIKED={};
    Object.keys(old).forEach(n=>{const id=eidByName(n);if(id)LIKED[id]=true;});
    localStorage.setItem(KEY,JSON.stringify(LIKED));
  }
}catch(e){LIKED={};}
const REMOTE={};
const CID_KEY="odottar_cid_v1";
let CID="";try{CID=localStorage.getItem(CID_KEY)||"";if(!CID){CID=(self.crypto&&crypto.randomUUID?crypto.randomUUID():String(Date.now())+Math.random().toString(36).slice(2));localStorage.setItem(CID_KEY,CID);}}catch(e){}
function saveLikes(){try{localStorage.setItem(KEY,JSON.stringify(LIKED))}catch(e){}}

function likeCount(e){if(COUNTER_ENDPOINT&&REMOTE[e.eid]!=null)return REMOTE[e.eid];return (LIKED[e.eid]?1:0);}
async function loadRemote(){if(!COUNTER_ENDPOINT)return;try{const r=await fetch(COUNTER_ENDPOINT+"/counts");Object.assign(REMOTE,await r.json());render();}catch(e){}}
// キー単位でリクエストを直列化し、最終的に LIKED の状態へ収束させる。
// 取り消し→再押下などの連打でも in-flight は常に1本に絞り、サーバ側の冪等化と合わせて二重カウントを防ぐ。
const HIT={};
async function syncLike(n){if(!COUNTER_ENDPOINT)return;
  const s=HIT[n]||(HIT[n]={inflight:false,sent:null});
  s.desired=!!LIKED[n];
  if(s.inflight)return; // 進行中なら desired だけ更新。完了後に収束させる
  s.inflight=true;
  try{
    while(s.sent!==s.desired){
      const want=s.desired,op=want?"inc":"dec";
      const r=await fetch(COUNTER_ENDPOINT+"/hit?k="+encodeURIComponent(n)+"&op="+op+"&id="+encodeURIComponent(CID),{method:"POST"});
      const j=await r.json();
      if(j&&j.count!=null)REMOTE[n]=j.count;
      s.sent=want;render();
    }
  }catch(e){}finally{s.inflight=false;}
}
const inThisWeek=e=>["live","week"].includes(statusOf(e));
const inNextWeek=e=>{if(!e.start||statusOf(e)==="cxl")return false;const t=d(e.start);return t>=NEXT_WEEK_START&&t<=NEXT_WEEK_END;};
const rankStatus=e=>{const s=statusOf(e);return s==="cxl"?2:(s==="tbd"?1:0);};
const TABS=[
  {id:"all", label:"すべて",order:"開催日順",sort:"smart",f:e=>true},
  {id:"pop", label:"人気", order:"行きたい数順", sort:"pop",  f:e=>true},
  {id:"week",label:"今週", order:"開催日が近い順", sort:"date", f:inThisWeek},
  {id:"next",label:"来週", order:"開催日が近い順", sort:"date", f:inNextWeek},
  {id:"liked",label:"おきにいり",order:"行きたい数順",sort:"pop",f:e=>!!LIKED[e.eid]},
];
const state={tab:"all",page:0};
const PER_PAGE=20;
function currentList(){
  const tab=TABS.find(t=>t.id===state.tab);
  let l=VISIBLE.filter(e=>tab.f(e));
  l.sort((a,b)=>{
    if(tab.sort==="pop")return likeCount(b)-likeCount(a);
    if(tab.sort==="smart"){const rs=rankStatus(a)-rankStatus(b);if(rs)return rs;
      const av=effStart(a),bv=effStart(b);if(av!==bv)return av.localeCompare(bv);return likeCount(b)-likeCount(a);}
    const av=effStart(a),bv=effStart(b);if(av!==bv)return av.localeCompare(bv);return likeCount(b)-likeCount(a);
  });
  return l;
}

function pagerHTML(total){

    if(i===0||i===pages-1||Math.abs(i-cur)<=1)items.push(i);
    else if(items[items.length-1]!=="…")items.push("…");
  }
  const btns=items.map(n=>n==="…"
    ?'<span class="pgdots">…</span>'
    :`<button class="pg${n===cur?' on':''}" onclick="goPage(${n})" title="${n*PER_PAGE+1}〜${Math.min((n+1)*PER_PAGE,total)}件目">${n+1}</button>`).join("");

  const next=`<button class="pg nav"${cur===pages-1?' disabled':''} onclick="goPage(${cur+1})" aria-label="次へ">›</button>`;
  return `<div class="pager">${prev}${btns}${next}</div>`;
}

function tagsOf(e){
  const t=new Set();
  const f=[e.feature,e.venue,e.scale,e.name,e.songs].join(" ");

  if(/飛び入り/.test(f))t.add("飛び入りOK");

  if(/公園|馬事公苑|広場/.test(e.venue))t.add("公園");
  if(/親水|隅田|川|竪川/.test(e.venue))t.add("川沿い");
  if(/神社|明神|地蔵|本願寺|靖国|念仏/.test(f))t.add("寺社");
  if(/駅前|ロータリー|SL広場|西口|セントラルパーク|徒歩[1-5]分|109前|駅東口/.test(f))t.add("駅近");
  if(/アニソン|アニメソング/.test(f))t.add("アニソン盆踊り");
  if(/河内音頭/.test(f))t.add("河内音頭");
  if(/中野音頭|渋谷音頭|自由が丘小唄|新橋音頭|丸の内音頭|六本人|築地音頭|大江戸助六/.test(f))t.add("ご当地音頭");
  if(/最大級|万人|7万|100万|30万|6万|大規模/.test(e.scale)||/大規模/.test(f))t.add("大規模");
  if(/DJ|ゲスト|BONJOVI|KOO|盆ジョヴィ/.test(f))t.add("有名人・DJゲスト");
  if(/浴衣/.test(f))t.add("浴衣が多い");
  if(/こども|子ども|子連れ|キャラクター|ソラカラ|すがもん/.test(f))t.add("子連れOK");

  return [...t];
}

      <div class="pname">${H(e.name)}</div>
      <div class="pdate">${longDate(e)}</div>
    </div>
    <div class="psec">概要</div>
    <div class="pnote">${summaryVal?H(summaryVal):`<span style="color:var(--sub)">情報募集中</span>`}</div>
    <div class="psec">開催情報</div>
    <div class="pcard">
      <div class="pitem"><span class="pl">踊り始め</span><span class="pv">${timeVal}</span></div>
      <div class="pitem"><span class="pl">会場</span><span class="pv">${H(e.venue)}</span></div>
      <div class="pitem"><span class="pl">エリア</span><span class="pv">${H(e.area)} ${H(e.station)}</span></div>
      <div class="pitem"><span class="pl">踊れる曲</span><span class="pv">${songVal}</span></div>
    </div>
    <a class="formlink" href="${safeHref(FORM_URL)}" target="_blank" rel="noopener">この盆踊りの情報を提供・修正する</a>
    <div class="pacts">
      <div class="btn primary" onclick="shareSheet('${esc}')">友達を誘う</div>
      <button class="btn heartbtn ${liked?'on':''}" onclick="pageLike('${e.eid}')">${liked?'\u2665 行きたい済':'\u2661 行きたい'} ${likeCount(e)}</button>
    </div>
    <a class="pofficial2" href="${safeHref(e.site)}" target="_blank" rel="noopener">盆踊り実行委員会公式サイト</a>
    ${ADSENSE_CLIENT?`<div class="adslot"><ins class="adsbygoogle" style="display:block" data-ad-client="${ADSENSE_CLIENT}" data-ad-slot="${ADSENSE_SLOT}" data-ad-format="auto" data-full-width-responsive="true"></ins></div>`:'<div class="adph">広告スペース（AdSense）</div>'}`;
  if(ADSENSE_CLIENT){try{(window.adsbygoogle=window.adsbygoogle||[]).push({});}catch(err){}}
}
function pageLike(eid){const e=DATA.find(x=>x.eid===eid);if(!e)return;
  if(LIKED[eid]){delete LIKED[eid];toast("「行きたい」を取り消しました");}else{LIKED[eid]=true;toast("行きたいに追加しました");}
  saveLikes();syncLike(eid);renderPage(e.name);}
function pageDone(name){if(DONE[name])delete DONE[name];else DONE[name]={y:2026};saveDone();renderPage(name);}
function route(){
  const pg=document.getElementById("page");
  let key=location.hash.startsWith("#e/")?location.hash.slice(3):(location.pathname.match(/\/event\/([^\/]+)/)||[])[1]||"";
  key=decodeURIComponent(key);
  if(key){const e=DATA.find(x=>x.eid===key)||DATA.find(x=>x.id===key)||DATA.find(x=>x.name===key);if(e){renderPage(e.name);pg.classList.add("open");pg.scrollTop=0;return;}}
  pg.classList.remove("open");
}
window.addEventListener("popstate",route);
window.addEventListener("hashchange",route);

function parseCSV(t){const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<t.length;i++){const c=t[i];
    if(q){if(c==='"'){if(t[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
    else{if(c==='"')q=true;else if(c===",")row.push(cur),cur="";else if(c==="\n")row.push(cur),rows.push(row),row=[],cur="";else if(c==="\r"){}else cur+=c;}}
  if(cur!==""||row.length)row.push(cur),rows.push(row);
  return rows;}
/* 決定的ハッシュ(FNV-1a 32bit)。CSV由来の新規行に不変eidを与えるためのフォールバック。 */
function fnv1a(s){let h=0x811c9dc5;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193)>>>0;}return h.toString(16).padStart(8,"0");}
async function loadSheet(){
  try{const r=await fetch(SHEET_CSV_URL);const t=await r.text();
    const rows=parseCSV(t).filter(r=>r.length>1);const head=rows.shift().map(h=>h.trim());
    const arr=rows.map(r=>{const o={};head.forEach((h,i)=>o[h]=(r[i]||"").trim());o.pop=parseInt(o.pop||"0",10)||0;return o;}).filter(o=>o.name);
    /* いいねキー(eid)を必ず持たせる。CSVにeid列があればそれを、無ければ同定できる既存行から引き継ぎ、
       それも無ければ name|start|venue から決定的に生成する(以後不変)。 */
    const BASE={};DATA.forEach(e=>{BASE[e.name+"|"+e.start+"|"+e.venue]=e.eid;});
    arr.forEach(o=>{const k=o.name+"|"+o.start+"|"+o.venue;if(!o.eid)o.eid=BASE[k]||("h"+fnv1a(k));});
    if(arr.length){DATA=arr;assignIds();rebuild();}
  }catch(e){}
}
function boot(){assignIds();render();loadRemote();initAds();route();var _ff=document.getElementById("formFooter");if(_ff)_ff.href=FORM_URL||"#";}
if(SHEET_CSV_URL){loadSheet().then(boot).catch(boot);}else{boot();}
</script>
</body>
